name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      release_notes: ${{ steps.release.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ -n "$INPUT_RELEASE_TAG" ]; then
            VERSION="$INPUT_RELEASE_TAG"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          NOTES="$(gh release view "$VERSION" --json body --jq '.body')"
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          {
            echo "release_notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build zip
        run: |
          zip -r extension.zip \
            manifest.json \
            popup.html \
            popup.js \
            icons/ \
            src/ \
            -x "*.DS_Store"

      - name: Upload zip to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.release.outputs.version }}" extension.zip --clobber

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ steps.release.outputs.version }}
          path: extension.zip

  chrome:
    needs: build
    runs-on: ubuntu-latest
    if: vars.CHROME_PUBLISH_ENABLED == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-${{ needs.build.outputs.version || github.ref_name }}

      - name: Publish to Chrome Web Store
        uses: browser-actions/release-chrome-extension@v0.2.1
        with:
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          extension-path: extension.zip
          oauth-client-id: ${{ secrets.CHROME_CLIENT_ID }}
          oauth-client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          oauth-refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}

  firefox:
    needs: build
    runs-on: ubuntu-latest
    if: vars.FIREFOX_PUBLISH_ENABLED == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: extension-${{ needs.build.outputs.version || github.ref_name }}

      - name: Publish to Firefox Add-ons
        uses: browser-actions/release-firefox-addon@v0.2.1
        with:
          addon-id: ${{ secrets.FIREFOX_ADDON_ID }}
          addon-path: extension.zip
          release-note: ${{ needs.build.outputs.release_notes }}
          auth-api-issuer: ${{ secrets.FIREFOX_API_ISSUER }}
          auth-api-secret: ${{ secrets.FIREFOX_API_SECRET }}
