name: Firefox Lint

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  firefox-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare extension package
        run: |
          mkdir -p "$RUNNER_TEMP/extension"
          cp manifest.json popup.html popup.js LICENSE "$RUNNER_TEMP/extension/"
          cp -R icons src "$RUNNER_TEMP/extension/"

      - name: Run Firefox lint
        run: npx --yes web-ext lint --source-dir "$RUNNER_TEMP/extension"
